---
layout: default
title: "My Library"
description: "Track your reading list, rate books, and manage your progress — works without an account, syncs across devices when you sign in."
---
<style>
  .rl-toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .rl-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .rl-view-toggle { display: flex; margin-left: auto; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .rl-view-toggle button {
    border: 0; background: transparent; color: var(--fg-muted); cursor: pointer;
    padding: 7px 12px; display: flex; align-items: center;
    border-right: 1px solid var(--border);
  }
  .rl-view-toggle button:last-child { border-right: 0; }
  .rl-view-toggle button.active { background: var(--accent); color: #fff; }

  /* Card view */
  .rl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
  .rl-card {
    border: 1px solid var(--border); border-radius: 12px; background: var(--bg);
    padding: 12px; display: flex; flex-direction: column; gap: 8px;
  }
  .rl-card-cover { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
  .rl-card-cover-empty {
    width: 100%; aspect-ratio: 2/3; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg-subtle); display: flex; align-items: center; justify-content: center;
    color: var(--fg-faint); font-size: 11px; padding: 10px; text-align: center; box-sizing: border-box;
  }
  .rl-card-t { font-size: 13px; font-weight: 700; line-height: 1.3; color: var(--fg); text-decoration: none;
               display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .rl-card-a { font-size: 11px; color: var(--fg-faint); }
  .rl-status-pill {
    font-size: 10px; font-weight: 700; border-radius: 999px; padding: 2px 9px;
    display: inline-block; width: fit-content;
  }
  .rl-status-want    { background: rgba(120,120,255,.12); color: #7a7aff; }
  .rl-status-reading { background: rgba(245,166,35,.14); color: #f5a623; }
  .rl-status-done    { background: rgba(34,160,107,.14); color: #22a06b; }

  /* List view */
  .rl-row {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 8px;
  }
  .rl-row-cover { width: 40px; aspect-ratio: 2/3; object-fit: cover; border-radius: 5px; border: 1px solid var(--border); flex-shrink: 0; }
  .rl-row-cover-empty { width: 40px; aspect-ratio: 2/3; border-radius: 5px; border: 1px solid var(--border); background: var(--bg-subtle); flex-shrink: 0; }

  .rl-stars { display: flex; align-items: center; gap: 1px; }
  .rl-stars button { background: none; border: 0; cursor: pointer; font-size: 15px; padding: 1px; color: var(--border-med, var(--border)); }
  .rl-stars button.lit { color: #f5a623; }
  .rl-select { width: auto; padding: 6px 10px; font-size: 12px; }
  .rl-remove {
    background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 8px;
    color: var(--fg-faint); cursor: pointer; padding: 5px 10px; font-size: 11px;
  }
  .rl-remove:hover { color: #d33; border-color: #d33; }
</style>

<div class="tool-page">
  <div class="container">
    <div class="tool-page-header">
      <p class="breadcrumb"><a href="{{ '/' | relative_url }}">Home</a> <span class="breadcrumb-sep">/</span> Tools <span class="breadcrumb-sep">/</span> My Library</p>
      <h1 class="tool-page-title">My Library</h1>
      <p class="tool-page-desc">Saved on this device — sign in to sync across devices.</p>
    </div>

    <div class="tool-form" style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;">
      <div class="form-group" style="flex:1;min-width:200px;margin-bottom:0;">
        <label class="form-label" for="add-title">Book title</label>
        <input type="text" id="add-title" class="form-input" placeholder="e.g. The Little Prince">
      </div>
      <div class="form-group" style="flex:1;min-width:160px;margin-bottom:0;">
        <label class="form-label" for="add-author">Author</label>
        <input type="text" id="add-author" class="form-input" placeholder="Author name">
      </div>
      <div class="form-group" style="width:150px;margin-bottom:0;">
        <label class="form-label" for="add-status">Status</label>
        <select id="add-status" class="form-select">
          <option value="want">Want to read</option>
          <option value="reading">Reading now</option>
          <option value="done">Finished</option>
        </select>
      </div>
      <button class="btn-primary" onclick="addBook()">Add book</button>
    </div>

    <div class="rl-toolbar">
      <div class="rl-tabs book-tabs" style="margin-bottom:0;">
        <button class="book-tab active" data-filter="all">All</button>
        <button class="book-tab" data-filter="want">Want to read</button>
        <button class="book-tab" data-filter="reading">Reading now</button>
        <button class="book-tab" data-filter="done">Finished</button>
      </div>
      <div class="rl-view-toggle" role="group" aria-label="View">
        <button id="view-cards" title="Card view" onclick="setView('cards')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </button>
        <button id="view-list" title="List view" onclick="setView('list')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div id="list-container"></div>
  </div>
</div>

<script>
const RL_KEY = 'bookhub_rl_v1';
const VIEW_KEY = 'bookhub_rl_view';
let currentFilter = 'all';
let currentView = 'cards';
try { currentView = localStorage.getItem(VIEW_KEY) || 'cards'; } catch {}

const escRl = (s) => String(s == null ? '' : s)
  .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
  .replaceAll('"', '&quot;').replaceAll("'", '&#39;');

function getList() { try { return JSON.parse(localStorage.getItem(RL_KEY)) || []; } catch { return []; } }
function saveList(list) {
  localStorage.setItem(RL_KEY, JSON.stringify(list));
  if (window.bhLibraryChanged) window.bhLibraryChanged();  // cloud sync when signed in
}

// Re-render after the signed-in merge pulls cloud items into localStorage.
document.addEventListener('bh-library-synced', () => render());

function addBook() {
  const title  = document.getElementById('add-title').value.trim();
  const author = document.getElementById('add-author').value.trim();
  const status = document.getElementById('add-status').value;
  if (!title) { document.getElementById('add-title').focus(); return; }

  const list = getList();
  if (list.find(b => b.title.toLowerCase() === title.toLowerCase())) {
    alert('This book is already in your list.');
    return;
  }
  list.unshift({ id: Date.now(), title, author, status, rating: 0, addedAt: Date.now() });
  saveList(list);
  document.getElementById('add-title').value = '';
  document.getElementById('add-author').value = '';
  render();
}

function removeBook(id) { saveList(getList().filter(b => b.id !== id)); render(); }
function setStatus(id, status) { saveList(getList().map(b => b.id === id ? { ...b, status } : b)); render(); }
function setRating(id, rating) {
  saveList(getList().map(b => b.id === id ? { ...b, rating: b.rating === rating ? 0 : rating } : b));
  render();
}
function setView(v) {
  currentView = v;
  try { localStorage.setItem(VIEW_KEY, v); } catch {}
  render();
}

const statusLabel = { want: 'Want to read', reading: 'Reading now', done: 'Finished' };

function bookLink(b) {
  return b.b
    ? `{{ '/summary/' | relative_url }}?b=${encodeURIComponent(b.b)}`
    : `{{ '/summary/' | relative_url }}?q=${encodeURIComponent(b.title)}${b.author ? `&author=${encodeURIComponent(b.author)}` : ''}&direct=true`;
}

function starsHtml(b) {
  return `<div class="rl-stars" role="group" aria-label="Your rating">` +
    [1,2,3,4,5].map(s =>
      `<button class="${s <= (b.rating || 0) ? 'lit' : ''}" onclick="setRating(${b.id},${s})" aria-label="Rate ${s}">★</button>`
    ).join('') + `</div>`;
}

function statusSelect(b) {
  return `<select onchange="setStatus(${b.id}, this.value)" class="form-select rl-select">
    <option value="want"    ${b.status==='want'    ? 'selected':''}>Want to read</option>
    <option value="reading" ${b.status==='reading' ? 'selected':''}>Reading now</option>
    <option value="done"    ${b.status==='done'    ? 'selected':''}>Finished</option>
  </select>`;
}

function coverHtml(b, cls, emptyCls) {
  return b.cover_url
    ? `<img class="${cls}" src="${escRl(b.cover_url)}" alt="" loading="lazy">`
    : `<div class="${emptyCls}">${escRl((b.title || '').slice(0, 40))}</div>`;
}

function render() {
  document.getElementById('view-cards').classList.toggle('active', currentView === 'cards');
  document.getElementById('view-list').classList.toggle('active', currentView === 'list');

  const list = getList().filter(b => currentFilter === 'all' || b.status === currentFilter);
  const container = document.getElementById('list-container');

  if (list.length === 0) {
    container.innerHTML = `
      <div class="result-placeholder" style="padding:48px 0;">
        <div class="result-placeholder-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </div>
        <p>${currentFilter === 'all' ? 'Your list is empty — add your first book above.' : 'No books in this category yet.'}</p>
      </div>`;
    return;
  }

  if (currentView === 'cards') {
    container.innerHTML = `<div class="rl-grid">` + list.map(b => `
      <div class="rl-card">
        <a href="${bookLink(b)}">${coverHtml(b, 'rl-card-cover', 'rl-card-cover-empty')}</a>
        <span class="rl-status-pill rl-status-${b.status}">${statusLabel[b.status] || ''}</span>
        <a class="rl-card-t" href="${bookLink(b)}">${escRl(b.title)}</a>
        ${b.author ? `<span class="rl-card-a">${escRl(b.author)}</span>` : ''}
        ${starsHtml(b)}
        <div style="display:flex;gap:8px;align-items:center;margin-top:auto;">
          ${statusSelect(b)}
          <button class="rl-remove" onclick="removeBook(${b.id})" title="Remove">✕</button>
        </div>
      </div>`).join('') + `</div>`;
  } else {
    container.innerHTML = list.map(b => `
      <div class="rl-row">
        <a href="${bookLink(b)}">${coverHtml(b, 'rl-row-cover', 'rl-row-cover-empty')}</a>
        <div style="flex:1;min-width:160px;">
          <a href="${bookLink(b)}" style="font-weight:600;font-size:14px;color:var(--fg);text-decoration:none;">${escRl(b.title)}</a>
          ${b.author ? `<div style="font-size:12px;color:var(--fg-faint);">${escRl(b.author)}</div>` : ''}
        </div>
        ${starsHtml(b)}
        ${statusSelect(b)}
        <button class="rl-remove" onclick="removeBook(${b.id})" title="Remove">✕</button>
      </div>`).join('');
  }
}

document.querySelectorAll('.book-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.book-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('add-title').addEventListener('keydown', e => { if (e.key === 'Enter') addBook(); });

render();
</script>

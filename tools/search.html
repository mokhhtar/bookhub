---
layout: default
title: "Advanced Book Search"
description: "Search 50,000+ books by genre, author, year, and language using Open Library."
---
<div class="tool-page">
  <div class="container">
    <div class="tool-page-header">
      <p class="breadcrumb"><a href="{{ '/' | relative_url }}">Home</a> <span class="breadcrumb-sep">/</span> Tools <span class="breadcrumb-sep">/</span> Advanced Search</p>
      <h1 class="tool-page-title">Advanced Search</h1>
      <p class="tool-page-desc">Search our full book index by title, author, or subject.</p>
    </div>

    <div class="tool-form">
      <div class="form-group">
        <label class="form-label" for="s-query">Search</label>
        <input type="text" id="s-query" class="form-input" placeholder="Title, author, or subject..." autocomplete="off">
      </div>
      <button class="btn-primary" id="submit-btn" onclick="doSearch()" style="margin-top:8px;">Search</button>
    </div>

    <div class="result-area" id="result">
      <div class="result-placeholder">
        <div class="result-placeholder-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <p>Start typing to search the book index.</p>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('s-query').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doSearch() {
  const q = document.getElementById('s-query').value.trim();
  const result = document.getElementById('result');
  if (!q) return;

  result.innerHTML = '<div class="result-loading"><span class="spinner"></span> Searching...</div>';

  try {
    const res = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=12`);
    const data = await res.json();
    if (!data.docs || data.docs.length === 0) {
      result.innerHTML = `<p class="result-error">No books found for "${q}".</p>`;
      return;
    }
    const html = data.docs.map(b => `
      <a href="{{ '/tools/summary' | relative_url }}?q=${encodeURIComponent(b.title)}" style="text-decoration:none;color:inherit;border:1px solid var(--border);border-radius:8px;padding:14px;display:flex;flex-direction:column;gap:4px;transition:border-color .15s;">
        <strong style="font-size:13px;line-height:1.4;">${b.title}</strong>
        <span style="font-size:12px;color:var(--fg-faint);">${(b.author_name||[]).slice(0,2).join(', ') || 'Unknown author'}</span>
        ${b.first_publish_year ? `<span style="font-size:11px;color:var(--fg-faint);">${b.first_publish_year}</span>` : ''}
      </a>`).join('');
    result.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;">${html}</div>`;
  } catch(e) {
    result.innerHTML = `<p class="result-error">Search failed. Please try again.</p>`;
  }
}
</script>

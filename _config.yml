title: "Litheca"
tagline: "Read less. Understand more."
description: "Seven AI-powered tools for readers — summaries, recommendations, discussion questions, comparisons, and more."
url: "https://mokhhtar.github.io"
baseurl: "/bookhub"
lang: "en"

author:
  name: "Litheca"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Collections
# _books files are auto-committed by the backend after each new summary
# (see bookhub-api/github_publisher.py); their front-matter `slug` drives
# the /summary/<slug>/ permalink. Same for _authors at /authors/<slug>/.
collections:
  books:
    output: true
    permalink: /summary/:slug/
  authors:
    output: true
    permalink: /authors/:slug/
  characters:
    output: true
    permalink: /characters/:slug/

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md

# Defaults
defaults:
  - scope:
      path: ""
      type: "books"
    values:
      layout: "book"
  - scope:
      path: ""
      type: "authors"
    values:
      layout: "author"
  - scope:
      path: ""
      type: "characters"
    values:
      layout: "character"
  - scope:
      path: ""
    values:
      layout: "default"

# Backend API (Render — update after deploy)
api_url: "https://bookhub-api-hnv7.onrender.com"

# Amazon Associates tag
amazon_tag: "oceansidehair-20"

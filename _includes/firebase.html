<!-- ═══════════════════════════════════════
     Firebase Auth layer (Phase 1 — see /firebase/DATA_MODEL.md)
     Email/password only, per owner decision. Analytics deliberately NOT
     loaded (not needed; avoids consent complexity). The config values
     below are public by design — all authorization lives in Firestore
     security rules (firebase/firestore.rules).
═══════════════════════════════════════ -->
<div
  class="auth-modal-backdrop"
  id="auth-modal"
  style="display: none"
  role="dialog"
  aria-modal="true"
  aria-labelledby="auth-title"
>
  <div class="auth-modal">
    <button class="auth-close" onclick="bhAuthUI.close()" aria-label="Close">
      ✕
    </button>
    <h2 id="auth-title" class="auth-heading">Sign in to BookHub</h2>

    <button class="auth-google-btn" onclick="bhAuthUI.google()">
      <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
        <path
          fill="#4285F4"
          d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"
        />
        <path
          fill="#34A853"
          d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"
        />
        <path
          fill="#FBBC05"
          d="M5.84 14.1A6.6 6.6 0 0 1 5.5 12c0-.73.13-1.44.34-2.1V7.06H2.18A11 11 0 0 0 1 12c0 1.77.43 3.45 1.18 4.94l3.66-2.84z"
        />
        <path
          fill="#EA4335"
          d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.16-3.16A10.96 10.96 0 0 0 12 1 11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"
        />
      </svg>
      Continue with Google
    </button>
    <div class="auth-divider"><span>or use email</span></div>

    <div class="auth-tabs">
      <button
        class="auth-tab active"
        data-mode="signin"
        onclick="bhAuthUI.mode('signin')"
      >
        Sign in
      </button>
      <button
        class="auth-tab"
        data-mode="signup"
        onclick="bhAuthUI.mode('signup')"
      >
        Create account
      </button>
    </div>

    <form id="auth-form" onsubmit="return bhAuthUI.submit(event);">
      <div id="auth-name-row" style="display: none">
        <label class="auth-label" for="auth-name">Display name</label>
        <input
          class="auth-input"
          id="auth-name"
          type="text"
          minlength="2"
          maxlength="40"
          autocomplete="nickname"
          placeholder="Shown next to your comments"
        />
      </div>
      <label class="auth-label" for="auth-email">Email</label>
      <input
        class="auth-input"
        id="auth-email"
        type="email"
        required
        autocomplete="email"
      />
      <label class="auth-label" for="auth-password">Password</label>
      <input
        class="auth-input"
        id="auth-password"
        type="password"
        minlength="6"
        required
        autocomplete="current-password"
      />
      <p class="auth-error" id="auth-error" style="display: none"></p>
      <button class="btn-primary auth-submit" id="auth-submit" type="submit">
        Sign in
      </button>
    </form>

    <button class="auth-forgot" id="auth-forgot" onclick="bhAuthUI.reset()">
      Forgot password?
    </button>
  </div>
</div>

<style>

</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getAuth,
    onAuthStateChanged,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    sendPasswordResetEmail,
    signOut,
    updateProfile,
    setPersistence,
    browserLocalPersistence,
    GoogleAuthProvider,
    signInWithPopup,
    signInWithRedirect,
    getRedirectResult,
    EmailAuthProvider,
    reauthenticateWithCredential,
    updatePassword,
    sendEmailVerification,
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import {
    getFirestore,
    initializeFirestore,
    persistentLocalCache,
    persistentMultipleTabManager,
    doc,
    getDoc,
    setDoc,
    addDoc,
    updateDoc,
    deleteDoc,
    collection,
    collectionGroup,
    query,
    where,
    limit,
    getDocs,
    getCountFromServer,
    serverTimestamp,
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyB9nLUuq4e4bxFVlpSX3OwEqeKVzOWhhSs",
    authDomain: "bookhub-42d9a.firebaseapp.com",
    projectId: "bookhub-42d9a",
    storageBucket: "bookhub-42d9a.firebasestorage.app",
    messagingSenderId: "482256955410",
    appId: "1:482256955410:web:e323d058751081021e50cb",
  });
  const auth = getAuth(app);
  // Explicit LOCAL persistence (IndexedDB) — sessions survive tabs,
  // restarts and direct links; no cookies involved.
  setPersistence(auth, browserLocalPersistence).catch(() => {});
  // Firestore with a persistent (IndexedDB) local cache: repeat reads of
  // favorites/comments/library paint from disk instantly while the network
  // refresh happens behind them. Multi-tab manager keeps several open tabs
  // sharing one cache. Falls back to the default in-memory instance where
  // IndexedDB is unavailable (e.g. some private-browsing modes).
  let db;
  try {
    db = initializeFirestore(app, {
      localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }),
    });
  } catch (e) {
    db = getFirestore(app);
  }

  // Auth state restores ASYNCHRONOUSLY (~1-2s) — without a hint the header
  // flashes "Sign in" on every page load and signed-in users think their
  // session was lost. A localStorage hint renders the account chip
  // instantly; onAuthStateChanged corrects it if the session truly ended.
  const HINT_KEY = "bh_auth_hint";
  const PHOTO_KEY = "bh_auth_photo";

  // Render an avatar circle: profile photo when available (Google accounts),
  // otherwise the name's first letter. DOM-built (no innerHTML) and
  // no-referrer — googleusercontent 403s photo requests that carry one.
  function setAvatar(el, name, photo) {
    if (!el) return;
    el.textContent = "";
    if (photo) {
      const img = document.createElement("img");
      img.src = photo;
      img.alt = "";
      img.referrerPolicy = "no-referrer";
      el.appendChild(img);
    } else {
      el.textContent = (name || "?").slice(0, 1).toUpperCase();
    }
  }
  window.bhSetAvatar = setAvatar; // account page reuses it

  try {
    const hint = localStorage.getItem(HINT_KEY);
    const photoHint = localStorage.getItem(PHOTO_KEY);
    const signinBtn0 = document.getElementById("auth-signin-btn");
    const chip0 = document.getElementById("auth-user-chip");
    if (hint && chip0 && signinBtn0) {
      signinBtn0.style.display = "none";
      chip0.style.display = "flex";
      setAvatar(document.getElementById("auth-avatar"), hint, photoHint);
      document.getElementById("auth-chip-name").textContent = hint
        .split(" ")[0]
        .slice(0, 14);
    }
  } catch (e) {}

  // Small global surface for other pages (library sync, comments, recs).
  window.bhFirebase = { app, auth, db };
  // Firestore functions for the site's classic (non-module) scripts.
  window.bhFs = {
    doc,
    getDoc,
    setDoc,
    addDoc,
    updateDoc,
    deleteDoc,
    collection,
    collectionGroup,
    query,
    where,
    limit,
    getDocs,
    getCountFromServer,
    serverTimestamp,
  };
  window.bhUser = null;

  // Raw auth operations for standalone pages (/account/) — the modal's
  // bhAuthUI and the account page share these instead of duplicating flows.
  // Rules require a 2-40 char displayName on the profile doc.
  const safeName = (u) =>
    ((u.displayName || (u.email || "Reader").split("@")[0]) + "  ")
      .slice(0, 40)
      .trim() || "Reader";

  // First Google sign-in has no profile doc yet — create/refresh it with
  // the Google display name (merge keeps createdAt on repeats). Shared by
  // both the popup and redirect completion paths below.
  async function finishGoogleUser(cred) {
    try {
      await setDoc(
        doc(db, "users", cred.user.uid),
        { displayName: safeName(cred.user), createdAt: serverTimestamp() },
        { merge: true },
      );
    } catch (e) {
      console.warn("Profile doc write failed:", e);
    }
    return cred;
  }

  // Popups are blocked outright in some browsers/in-app webviews (in-app
  // browsers like Instagram/Facebook, some mobile Safari configs, popup
  // blockers) — signInWithPopup throws instead of opening anything. Fall
  // back to a full-page redirect in exactly those cases; a real user
  // cancel (closed the popup themselves) should NOT redirect them away.
  const POPUP_FALLBACK_CODES = new Set([
    "auth/popup-blocked",
    "auth/cancelled-popup-request",
    "auth/operation-not-supported-in-this-environment",
  ]);

  // One-shot flag: set right before an INTENTIONAL sign-out (post-sign-up, or
  // a blocked unverified sign-in) so onAuthStateChanged doesn't treat it as a
  // user sign-out (no data-clear, no personal-page redirect).
  let suppressSignoutFx = false;

  window.bhAuthOps = {
    // Email accounts must confirm their address before they can sign in.
    // We create the account, but every entry point checks emailVerified;
    // an unverified sign-in is bounced (and the link re-sent). Google
    // accounts are always email_verified, so they pass straight through.
    async signIn(email, pw) {
      const cred = await signInWithEmailAndPassword(auth, email, pw);
      if (!cred.user.emailVerified) {
        // Only claim "we've re-sent the link" if the re-send actually went
        // through — Firebase rate-limits sendEmailVerification and the very
        // next attempt after sign-up fails with auth/too-many-requests.
        let resent = true;
        try { await sendEmailVerification(cred.user); } catch (e) { resent = false; }
        suppressSignoutFx = true;
        await signOut(auth);
        throw { code: resent ? "auth/email-not-verified" : "auth/email-not-verified-no-resend" };
      }
      return cred;
    },
    async signUp(name, email, pw) {
      const cred = await createUserWithEmailAndPassword(auth, email, pw);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db, "users", cred.user.uid), {
        displayName: name,
        createdAt: serverTimestamp(),
      });
      // Send the confirmation link, then sign the new account OUT — it can't
      // be used until the email is verified. Surface a send failure to the
      // caller (instead of swallowing it) so the UI can say why.
      let verifyError = null;
      try {
        await sendEmailVerification(cred.user);
      } catch (e) {
        verifyError = e;
        console.warn("Verification email failed:", e && e.code, e);
      }
      suppressSignoutFx = true;
      await signOut(auth);
      return { email, verificationSent: !verifyError, verifyError };
    },
    // Re-send the confirmation email. Works from a signed-in unverified
    // session (account page) OR right after a blocked sign-in attempt.
    resendVerification: () => sendEmailVerification(auth.currentUser),
    async signInGoogle() {
      try {
        const cred = await signInWithPopup(auth, new GoogleAuthProvider());
        return await finishGoogleUser(cred);
      } catch (e) {
        console.error("Google popup sign-in failed:", e && e.code, e);
        if (POPUP_FALLBACK_CODES.has(e && e.code)) {
          await signInWithRedirect(auth, new GoogleAuthProvider());
          return null; // page navigates away; onAuthStateChanged picks it up on return
        }
        throw e;
      }
    },
    reset: (email) => sendPasswordResetEmail(auth, email),
    // Flush any pending library push before signing out so a last-second
    // change survives the sign-out localStorage clear (see flushLibrary).
    async signOut() {
      await flushLibrary();
      return signOut(auth);
    },
    // Password change for email/password accounts: reauth with the current
    // password (Firebase requires a recent login), then update.
    async changePassword(currentPw, newPw) {
      const user = auth.currentUser;
      if (!user || !user.email) throw { code: "auth/no-user" };
      const cred = EmailAuthProvider.credential(user.email, currentPw);
      await reauthenticateWithCredential(user, cred);
      await updatePassword(user, newPw);
    },
    // Which providers this account uses ("password", "google.com", …).
    providers: () =>
      auth.currentUser
        ? auth.currentUser.providerData.map((p) => p.providerId)
        : [],
  };

  const $ = (id) => document.getElementById(id);
  let mode = "signin";

  const ERRORS = {
    "auth/email-already-in-use": "An account with this email already exists.",
    "auth/invalid-email": "That email address doesn't look valid.",
    "auth/weak-password": "Password must be at least 6 characters.",
    "auth/invalid-credential": "Wrong email or password.",
    "auth/user-not-found": "No account with this email.",
    "auth/wrong-password": "Wrong email or password.",
    "auth/too-many-requests": "Too many attempts — try again in a few minutes.",
    "auth/email-not-verified":
      "Confirm your email first — we've re-sent the link. Check your inbox and spam folder.",
    "auth/email-not-verified-no-resend":
      "Confirm your email first — use the link we already sent (check spam too). We couldn't send a new one just now; try again in a few minutes.",
  };
  const explain = (e) =>
    ERRORS[e && e.code] || "Something went wrong — please try again.";

  window.bhAuthUI = {
    open(startMode) {
      this.mode(startMode || "signin");
      $("auth-modal").style.display = "flex";
      $("auth-email").focus();
    },
    close() {
      $("auth-modal").style.display = "none";
      this.error("");
    },
    mode(m) {
      mode = m;
      document
        .querySelectorAll(".auth-tab")
        .forEach((t) => t.classList.toggle("active", t.dataset.mode === m));
      $("auth-name-row").style.display = m === "signup" ? "block" : "none";
      $("auth-name").required = m === "signup";
      $("auth-submit").textContent =
        m === "signup" ? "Create account" : "Sign in";
      $("auth-title").textContent =
        m === "signup" ? "Create your BookHub account" : "Sign in to BookHub";
      this.error("");
    },
    error(msg) {
      const el = $("auth-error");
      el.textContent = msg;
      el.style.display = msg ? "block" : "none";
    },
    async submit(ev) {
      ev.preventDefault();
      const email = $("auth-email").value.trim();
      const password = $("auth-password").value;
      const btn = $("auth-submit");
      btn.disabled = true;
      this.error("");
      try {
        if (mode === "signup") {
          const name = $("auth-name").value.trim();
          if (name.length < 2) {
            this.error("Please pick a display name (2-40 characters).");
            return false;
          }
          // Delegate to the shared signUp (creates the account, emails the
          // link, signs back out). Don't close — switch to sign-in and tell
          // them to confirm first.
          const res = await window.bhAuthOps.signUp(name, email, password);
          this.mode("signin");
          this.error(
            res.verificationSent
              ? `Almost there — we sent a confirmation link to ${email}. Click it (check spam too), then sign in.`
              : `Account created, but the confirmation email couldn't be sent: ${explain(res.verifyError)} You can retry from "Forgot password?" or contact support.`,
          );
          return false;
        } else {
          // Routes through bhAuthOps.signIn, which blocks unverified accounts.
          await window.bhAuthOps.signIn(email, password);
          this.close();
        }
      } catch (e) {
        this.error(explain(e));
      } finally {
        btn.disabled = false;
      }
      return false;
    },
    async reset() {
      const email = $("auth-email").value.trim();
      if (!email) {
        this.error(
          "Enter your email above first, then tap 'Forgot password?'.",
        );
        return;
      }
      try {
        await sendPasswordResetEmail(auth, email);
        this.error("Reset link sent — check your inbox.");
      } catch (e) {
        this.error(explain(e));
      }
    },
    async google() {
      this.error("");
      try {
        await window.bhAuthOps.signInGoogle();
        this.close();
      } catch (e) {
        if (e && e.code !== "auth/popup-closed-by-user") this.error(explain(e));
      }
    },
    async signOut() {
      try {
        await flushLibrary();
      } catch (e) {}
      try {
        await signOut(auth);
      } catch (e) {}
      const menu = $("auth-user-menu");
      if (menu) menu.style.display = "none";
    },
    toggleMenu() {
      const menu = $("auth-user-menu");
      if (menu)
        menu.style.display = menu.style.display === "block" ? "none" : "block";
    },
  };

  // ── My Library sync (Phase 2) ─────────────────────────────
  // localStorage (bookhub_rl_v1) stays the working store on every page —
  // logged-out users lose nothing. This layer mirrors it to ONE Firestore
  // doc (users/{uid}/library/list) so the library follows the account:
  // on login, cloud+local are merged (local wins per title) into both
  // stores; after any local mutation, pages call window.bhLibraryChanged()
  // and the full list is pushed, debounced.
  const RL_KEY = "bookhub_rl_v1";
  const localList = () => {
    try {
      return JSON.parse(localStorage.getItem(RL_KEY)) || [];
    } catch (e) {
      return [];
    }
  };
  let pushTimer = null;
  let pushPending = false; // a debounced push is scheduled but not yet written

  async function pushLibrary() {
    pushPending = false;
    if (!window.bhUser) return;
    try {
      await setDoc(doc(db, "users", window.bhUser.uid, "library", "list"), {
        items: localList().slice(0, 500),
        updatedAt: serverTimestamp(),
      });
    } catch (e) {
      console.warn("Library push failed:", e);
    }
  }

  window.bhLibraryChanged = function () {
    pushPending = true;
    clearTimeout(pushTimer);
    pushTimer = setTimeout(pushLibrary, 2000);
  };

  // Flush a pending debounced push immediately. Called before sign-out so a
  // change made within the 2s debounce window isn't lost when the sign-out
  // handler clears bookhub_rl_v1 from localStorage — the write still runs
  // while the user is authenticated (before signOut(auth)).
  async function flushLibrary() {
    if (!pushPending) return;
    clearTimeout(pushTimer);
    await pushLibrary();
  }

  // ── Reader star ratings (books/{slug}/ratings/{uid}) ──────
  // Publish the signed-in user's 1-5 star rating, or remove it when stars
  // is 0/null (rating toggled off). Fire-and-forget: the local library
  // rating stays the user's own source of truth; this only feeds the
  // public per-book aggregate.
  window.bhPublishRating = async function (slug, stars) {
    try {
      if (!window.bhUser || !slug) return;
      const ref = doc(db, "books", slug, "ratings", window.bhUser.uid);
      const s = Math.round(Number(stars) || 0);
      if (s >= 1 && s <= 5) {
        await setDoc(ref, { stars: s, updatedAt: serverTimestamp() });
      } else {
        await deleteDoc(ref);
      }
    } catch (e) {
      console.warn("Rating publish failed:", e && e.code, e);
    }
  };

  // Aggregate a book's reader ratings via five COUNT queries (one per
  // star) — no stored aggregate to drift, cheap on the free tier.
  // Returns {total, avg, dist:{1..5}} or null when nobody rated yet, so
  // callers hide the section entirely (no data beats wrong data).
  window.bhFetchRatingStats = async function (slug) {
    try {
      if (!slug) return null;
      const col = collection(db, "books", slug, "ratings");
      const counts = await Promise.all([1, 2, 3, 4, 5].map((s) =>
        getCountFromServer(query(col, where("stars", "==", s)))));
      const dist = {};
      let total = 0, sum = 0;
      counts.forEach((c, i) => {
        const n = c.data().count;
        dist[i + 1] = n;
        total += n;
        sum += n * (i + 1);
      });
      return total ? { total, avg: sum / total, dist } : null;
    } catch (e) {
      console.warn("Rating stats failed:", e && e.code, e);
      return null;
    }
  };

  // ── Shared cover backfill (self-heal) ─────────────────────
  // Entries saved before the cover picker existed, added via a flow that
  // had no cover, or synced from another device, can lack a cover image.
  // Given a list of {title, author, <coverKey>} objects, look up the
  // missing covers via /search and fill them IN PLACE. Returns true if it
  // changed anything so the caller can persist + re-render. Grounded: only
  // ever fills a real cover URL the catalog returned — never a guess.
  const BH_API = "{{ site.api_url }}";
  window.bhBackfillCovers = async function (items, coverKey = "cover_url") {
    if (!Array.isArray(items)) return false;
    const missing = items.filter((b) => b && b.title && !b[coverKey]);
    let changed = false;
    for (const b of missing.slice(0, 25)) {
      // cap the burst of requests
      try {
        const res = await fetch(
          `${BH_API}/search?q=${encodeURIComponent(b.title)}`,
        );
        if (!res.ok) continue;
        const data = await res.json();
        if (!Array.isArray(data) || !data.length) continue;
        let hit = data[0];
        if (b.author) {
          const a = b.author.toLowerCase();
          const m = data.find(
            (x) =>
              (x.author || "").toLowerCase().includes(a) ||
              a.includes((x.author || "").toLowerCase()),
          );
          if (m) hit = m;
        }
        if (hit && hit.cover_url) {
          b[coverKey] = hit.cover_url;
          changed = true;
        }
      } catch (e) {
        /* skip this one — best-effort enrichment */
      }
    }
    return changed;
  };

  async function mergeLibraryOnLogin(user) {
    try {
      const snap = await getDoc(doc(db, "users", user.uid, "library", "list"));
      const cloud =
        snap.exists() && Array.isArray(snap.data().items)
          ? snap.data().items
          : [];
      const byTitle = new Map();
      for (const b of cloud)
        if (b && b.title) byTitle.set(b.title.toLowerCase(), b);
      for (const b of localList())
        if (b && b.title) byTitle.set(b.title.toLowerCase(), b); // local wins
      const merged = [...byTitle.values()].sort(
        (a, b) => (b.addedAt || 0) - (a.addedAt || 0),
      );
      localStorage.setItem(RL_KEY, JSON.stringify(merged));
      await pushLibrary();
      document.dispatchEvent(new CustomEvent("bh-library-synced"));
    } catch (e) {
      console.warn("Library merge failed:", e);
    }
  }

  // Completes a signInWithRedirect() round trip, if one is in progress —
  // a no-op (resolves to null) on every normal page load.
  getRedirectResult(auth)
    .then((cred) => {
      if (cred && cred.user) finishGoogleUser(cred);
    })
    .catch((e) =>
      console.error("Google redirect sign-in failed:", e && e.code, e),
    );

  // Track the previous auth identity so we can tell a genuine SIGN-OUT
  // (a real user was here, now gone) apart from a first-load "no session".
  // undefined = baseline not yet established; null = confirmed signed out.
  let __prevUid = undefined;

  onAuthStateChanged(auth, (user) => {
    // A genuine user sign-out (had a user, now null) — EXCEPT the intentional
    // post-sign-up / blocked-sign-in sign-out, which must not clear data or
    // redirect personal pages.
    const signedOut = !!__prevUid && !user && !suppressSignoutFx;
    if (!user) suppressSignoutFx = false; // consume the one-shot suppressor
    __prevUid = user ? user.uid : null;

    // Only merge/push the cloud library for a VERIFIED session. This skips
    // the brief unverified sign-in that a sign-up or a blocked sign-in causes,
    // so those transient sessions never pull an account's data into
    // localStorage (no leak on a shared browser, no race with the sign-out).
    if (user && user.emailVerified) mergeLibraryOnLogin(user);
    window.bhUser = user || null;

    // On sign-out, wipe the per-account local stores so the next person on
    // this browser can't see the previous account's library / history.
    // Safe: a signed-in user's library is mirrored to Firestore (pushLibrary)
    // and restored by mergeLibraryOnLogin on next sign-in. Anonymous visitors
    // never hit this branch, so their local list is untouched.
    if (signedOut) {
      try {
        localStorage.removeItem(RL_KEY);
        localStorage.removeItem("bookhub_recent_v1");
        localStorage.removeItem("bh_acct_cache_v1"); // account-page snapshot
      } catch (e) {}
    }

    try {
      if (user) {
        localStorage.setItem(
          HINT_KEY,
          user.displayName || user.email || "Account",
        );
        if (user.photoURL) localStorage.setItem(PHOTO_KEY, user.photoURL);
        else localStorage.removeItem(PHOTO_KEY);
      } else {
        localStorage.removeItem(HINT_KEY);
        localStorage.removeItem(PHOTO_KEY);
      }
    } catch (e) {}
    const signinBtn = $("auth-signin-btn");
    const chip = $("auth-user-chip");
    if (signinBtn) signinBtn.style.display = user ? "none" : "";
    if (chip) {
      chip.style.display = user ? "flex" : "none";
      if (user) {
        const name = user.displayName || user.email || "Account";
        setAvatar($("auth-avatar"), name, user.photoURL || null);
        $("auth-chip-name").textContent = name.split(" ")[0].slice(0, 14);
      }
    }
    // Let feature scripts (library sync, comments…) react to auth state.
    // `signedOut` lets personal pages redirect away on a real sign-out.
    document.dispatchEvent(
      new CustomEvent("bh-auth", { detail: { user: user || null, signedOut } }),
    );
  });

  // Close the account menu on outside click.
  document.addEventListener("click", (e) => {
    const menu = $("auth-user-menu");
    const chip = $("auth-user-chip");
    if (
      menu &&
      menu.style.display === "block" &&
      !menu.contains(e.target) &&
      !(chip && chip.contains(e.target))
    ) {
      menu.style.display = "none";
    }
  });
</script>

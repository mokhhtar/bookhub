<header class="site-header" role="banner">
  <div class="container header-inner">

    <!-- LOGO — replace SVG with your final mark -->
    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="{{ site.title }} home">
      <svg class="logo-mark" width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
        <rect width="28" height="28" rx="6" fill="#171717"/>
        <rect x="7" y="8" width="4" height="12" rx="1" fill="white"/>
        <rect x="13" y="8" width="4" height="12" rx="1" fill="white" opacity="0.5"/>
        <rect x="19" y="8" width="2" height="12" rx="1" fill="white" opacity="0.25"/>
      </svg>
      <span class="logo-text">BookHub</span>
      <!-- TODO: replace logo-text with your final name once decided -->
    </a>

    <!-- Primary nav -->
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="{{ '/' | relative_url }}"                   class="nav-link">Overview</a>
      <a href="{{ '/summary' | relative_url }}"            class="nav-link">Summarizer</a>
      <a href="{{ '/bestsellers/' | relative_url }}"       class="nav-link">Bestsellers</a>
      <a href="{{ '/categories/' | relative_url }}"        class="nav-link">Categories</a>
      <a href="{{ '/authors/' | relative_url }}"           class="nav-link">Authors</a>
      <a href="{{ '/tools/reading-list' | relative_url }}" class="nav-link">My Library</a>
    </nav>

    <div class="header-right" style="display: flex; align-items: center; gap: 12px;">
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme" title="Toggle theme">
        <!-- Sun icon -->
        <svg class="theme-icon sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <!-- Moon icon -->
        <svg class="theme-icon moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
      <a href="{{ '/summary' | relative_url }}" class="btn-primary btn-sm">Get started</a>
    </div>

    <button class="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="site-nav">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

  </div>
</header>

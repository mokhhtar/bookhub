name: Refresh NYT bestsellers data

# Bakes the current #1 book from every New York Times list into
# _data/nyt_leaders.yml so /bestsellers/ can render server-side.
#
# Why this exists: the page used to be filled entirely by a client-side
# fetch, which meant a crawler — or anyone whose request landed while
# Render's free tier was cold-starting — saw an empty page. That is thin
# content on a page we actually want indexed. The live fetch still runs
# on top of this as a freshness refresh; the committed data is the floor,
# not the ceiling.
#
# The NYT updates its lists weekly (published Wednesdays), so this runs
# early Thursday. GitHub Pages rebuilds on the resulting commit anyway,
# so the whole thing costs nothing beyond the Action minutes.
#
# No secret needed: /nyt/leaders is a public read endpoint.

on:
  schedule:
    - cron: "40 6 * * 4"   # Thursdays 06:40 UTC, after the weekly list lands
  workflow_dispatch: {}     # manual trigger for testing

permissions:
  contents: write

concurrency:
  group: refresh-bestsellers
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wake the API (Render free tier sleeps after ~15 min idle)
        run: curl -sS -m 120 --retry 3 --retry-delay 15 "https://bookhub-api-hnv7.onrender.com/health" || true

      - name: Fetch the current list leaders
        run: |
          curl -sS -f -m 180 --retry 3 --retry-delay 20 \
            "https://bookhub-api-hnv7.onrender.com/nyt/leaders" -o /tmp/leaders.json
          test -s /tmp/leaders.json

      - name: Write _data/nyt_leaders.yml
        run: |
          python3 - <<'PY'
          import json, pathlib, datetime

          raw = json.load(open("/tmp/leaders.json"))
          books = raw.get("books") or []

          # Refuse to overwrite good data with a bad response. An empty or
          # suspiciously short payload means the upstream had a bad day, and
          # committing it would blank the page until next Thursday.
          if len(books) < 5:
              raise SystemExit(f"only {len(books)} books returned; refusing to overwrite")

          def clean(b):
              return {
                  "title": (b.get("title") or "").strip(),
                  "author": (b.get("author") or "").strip(),
                  "list_name": (b.get("list_name") or "").strip(),
                  "weeks_on_list": int(b.get("weeks_on_list") or 0),
                  "book_image": b.get("book_image") or "",
                  "isbn_13": b.get("isbn_13") or "",
              }

          out = {
              "updated": datetime.datetime.now(datetime.timezone.utc)
                          .strftime("%Y-%m-%d"),
              "books": [clean(b) for b in books if (b.get("title") or "").strip()],
          }

          # Hand-rolled YAML: no PyYAML on a bare runner, and the shape is
          # simple enough that a dependency would cost more than it saves.
          def q(s):
              return '"' + str(s).replace("\\", "\\\\").replace('"', '\\"') + '"'

          lines = [
              "# Generated by .github/workflows/refresh-bestsellers.yml — do not edit by hand.",
              "# Lets /bestsellers/ render server-side instead of depending on a",
              "# client-side fetch that a crawler may never see.",
              f"updated: {q(out['updated'])}",
              "books:",
          ]
          for b in out["books"]:
              lines.append(f"  - title: {q(b['title'])}")
              lines.append(f"    author: {q(b['author'])}")
              lines.append(f"    list_name: {q(b['list_name'])}")
              lines.append(f"    weeks_on_list: {b['weeks_on_list']}")
              lines.append(f"    book_image: {q(b['book_image'])}")
              lines.append(f"    isbn_13: {q(b['isbn_13'])}")

          pathlib.Path("_data").mkdir(exist_ok=True)
          pathlib.Path("_data/nyt_leaders.yml").write_text(
              "\n".join(lines) + "\n", encoding="utf-8")
          print(f"wrote {len(out['books'])} books")
          PY

      - name: Commit if the lists actually changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- _data/nyt_leaders.yml; then
            echo "No change this week; nothing to commit."
            exit 0
          fi
          git add _data/nyt_leaders.yml
          git commit -m "data: refresh NYT bestseller leaders"
          git push
